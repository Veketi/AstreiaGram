spring:
  application:
    name: user-service

  mvc:
    throw-exception-if-no-handler-found: true

  # web:
  #   resources:
  #     add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:astreiagram_users}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_A_256BIT_RANDOM_SECRET_KEY_HERE}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  service-secret: ${JWT_SERVICE_SECRET:CHANGE_ME_SERVICE_SECRET_KEY_FOR_INTER_SERVICE_CALLS}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.astreiagram: INFO
    org.springframework.security: WARN
