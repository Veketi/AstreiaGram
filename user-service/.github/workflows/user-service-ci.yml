name: User Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'user-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'user-service/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: astreiagram_users_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        working-directory: user-service
        run: mvn -q clean verify
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: astreiagram_users_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-at-least-256-bits-long-for-hmac
          JWT_SERVICE_SECRET: ci-test-service-secret

  docker-publish:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/astreiagram-user-service:latest
            ${{ secrets.DOCKER_USERNAME }}/astreiagram-user-service:${{ github.sha }}
